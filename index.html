<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialEncuentro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff4d6d, #ff758f);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.app {
  width: 340px;
  text-align: center;
}

.card {
  width: 100%;
  height: 480px;
  background: white;
  border-radius: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  overflow: hidden;
  transition: transform 0.4s ease, opacity 0.4s;
}

.card img {
  width: 100%;
  height: 70%;
  object-fit: cover;
}

.info {
  padding: 15px;
}

.info h2 {
  margin: 5px 0;
}

.info p {
  color: #555;
}

.buttons {
  margin-top: 15px;
}

button {
  padding: 14px 28px;
  margin: 10px;
  border: none;
  border-radius: 50px;
  font-size: 20px;
  cursor: pointer;
  transition: transform 0.2s;
}

button:hover {
  transform: scale(1.1);
}

.like {
  background: #28a745;
  color: white;
}

.nope {
  background: #dc3545;
  color: white;
}

.swipe-left {
  transform: translateX(-500px) rotate(-25deg);
  opacity: 0;
}

.swipe-right {
  transform: translateX(500px) rotate(25deg);
  opacity: 0;
}
</style>
</head>

<body>

<div class="app">
  <div class="card" id="card">
    <img id="photo">
    <div class="info">
      <h2 id="name"></h2>
      <p id="bio"></p>
    </div>
  </div>

  <div class="buttons">
    <button class="nope" onclick="swipe('left')">❌</button>
    <button class="like" onclick="swipe('right')">❤️</button>
  </div>
</div>

<script>
const profiles = [
  { name: "Camila, 24", bio: "Amante de la playa 🌴", img: "https://randomuser.me/api/portraits/women/65.jpg" },
  { name: "Daniela, 27", bio: "Bailarina 💃", img: "https://randomuser.me/api/portraits/women/44.jpg" },
  { name: "Valeria, 23", bio: "Fitness 🏋️‍♀️", img: "https://randomuser.me/api/portraits/women/68.jpg" },
  { name: "Ashley, 25", bio: "Le encanta viajar ✈️", img: "https://randomuser.me/api/portraits/women/12.jpg" },
  { name: "María, 29", bio: "Empresaria 💼", img: "https://randomuser.me/api/portraits/women/32.jpg" },
  { name: "Sofía, 22", bio: "Diseñadora 🎨", img: "https://randomuser.me/api/portraits/women/21.jpg" },
  { name: "Paola, 28", bio: "Ama la música 🎶", img: "https://randomuser.me/api/portraits/women/56.jpg" },
  { name: "Laura, 26", bio: "Café y libros ☕📚", img: "https://randomuser.me/api/portraits/women/50.jpg" },
  { name: "Karla, 30", bio: "Apasionada del gym 💪", img: "https://randomuser.me/api/portraits/women/47.jpg" },
  { name: "Natalia, 24", bio: "Aventurera 🌎", img: "https://randomuser.me/api/portraits/women/39.jpg" }
];

let index = 0;

function loadProfile() {
  const p = profiles[index];
  document.getElementById("name").innerText = p.name;
  document.getElementById("bio").innerText = p.bio;
  document.getElementById("photo").src = p.img;
}

function swipe(direction) {
  const card = document.getElementById("card");
  card.classList.add(direction === "left" ? "swipe-left" : "swipe-right");

  setTimeout(() => {
    index = (index + 1) % profiles.length;
    loadProfile();
    card.classList.remove("swipe-left", "swipe-right");
  }, 400);
}

/* SWIPE */
let startX = 0;
const card = document.getElementById("card");

card.addEventListener("mousedown", e => startX = e.clientX);
card.addEventListener("mouseup", e => {
  let endX = e.clientX;
  if (endX - startX > 60) swipe("right");
  else if (startX - endX > 60) swipe("left");
});

card.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (endX - startX > 60) swipe("right");
  else if (startX - endX > 60) swipe("left");
});

loadProfile();
</script>

</body>
</html>
