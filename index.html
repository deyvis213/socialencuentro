<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bind | Conecta, conoce y encuentra tu match</title>
    <style>
        :root {
            --primario: #fd3a73;
            --secundario: #ff5858;
            --oscuro: #0a0a0a;
            --glass: rgba(0, 0, 0, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--oscuro);
            color: white;
            overflow: hidden;
        }

        /* --- NAVEGACIÓN (HORIZONTAL) --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(45deg, #fff, var(--primario));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -1px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.7;
            transition: 0.3s;
            white-space: nowrap;
        }

        .nav-links a:hover {
            opacity: 1;
            color: var(--primario);
        }

        /* --- PANTALLA PRINCIPAL (HOME) --- */
        #home-screen {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-content h1 {
            font-size: clamp(50px, 8vw, 100px);
            margin: 0;
            font-weight: 900;
            letter-spacing: -4px;
        }

        .hero-content p {
            font-size: clamp(16px, 2vw, 24px);
            margin: 10px 0 40px;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-entrar {
            padding: 18px 60px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, var(--primario), var(--secundario));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(253, 58, 115, 0.4);
            transition: 0.3s;
        }

        .btn-entrar:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(253, 58, 115, 0.6);
        }

        /* --- PANTALLA DE ENCUENTRO --- */
        #app-screen {
            display: none;
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding-top: 60px;
        }

        .card {
            width: 340px;
            height: 500px;
            background: #222;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            transition: transform 0.4s ease;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 25px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            box-sizing: border-box;
        }

        .card-info h2 { margin: 0; font-size: 26px; }
        .card-info p { margin: 5px 0 0; font-size: 15px; opacity: 0.7; }

        /* Controles horizontales */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            align-items: center;
        }

        .btn-action {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }

        .btn-no { color: #ff4444; border: 2px solid #ff4444; }
        .btn-yes { color: #28a745; border: 2px solid #28a745; }
        .btn-undo { width: 50px; height: 50px; font-size: 18px; background: #333; color: #fff; }

        .btn-action:active { transform: scale(0.9); }

        /* Animaciones */
        .swipe-left { transform: translateX(-800px) rotate(-30deg); opacity: 0; }
        .swipe-right { transform: translateX(800px) rotate(30deg); opacity: 0; }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo" onclick="showHome()">Bind</a>
        <div class="nav-links">
            <a href="#">Idioma</a>
            <a href="#" onclick="showHome()">Inicio</a>
            <a href="#">Iniciar sesión</a>
            <a href="#">Productos</a>
            <a href="#">Más información</a>
            <a href="#">Seguridad</a>
            <a href="#">Asistencia</a>
            <a href="#">Descargar</a>
        </div>
    </nav>

    <section id="home-screen">
        <div class="hero-content">
            <h1>Bind</h1>
            <p>Conecta, conoce y encuentra tu match ❤️</p>
            <button class="btn-entrar" onclick="startApp()">Entrar</button>
        </div>
    </section>

    <section id="app-screen">
        <div class="card" id="card">
            <img id="p-img" src="" alt="Cargando...">
            <div class="card-info">
                <h2 id="p-name"></h2>
                <p id="p-bio"></p>
            </div>
        </div>

        <div class="controls">
            <button class="btn-action btn-undo" title="Deshacer" onclick="rewind()">🔄</button>
            <button class="btn-action btn-no" title="No me gusta" onclick="swipe('left')">✖️</button>
            <button class="btn-action btn-yes" title="Me gusta" onclick="swipe('right')">❤️</button>
        </div>
    </section>

    <script>
        const profiles = [
            { name: "Carolina, 25", bio: "Amo el café y los atardeceres en la playa 🌊", img: "https://randomuser.me/api/portraits/women/50.jpg" },
            { name: "Sofía, 22", bio: "Bailarina de bachata y fan de la pizza 🍕", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=500&q=80" },
            { name: "Massiel, 27", bio: "Viajera incansable y fotógrafa aficionada 📸", img: "https://randomuser.me/api/portraits/women/45.jpg" },
            { name: "Lisandra, 23", bio: "Fitness y vida saludable 🏋️‍♀️", img: "https://randomuser.me/api/portraits/women/65.jpg" }
        ];

        let index = 0;
        let lastIndex = null;

        function showHome() {
            document.getElementById("app-screen").style.display = "none";
            document.getElementById("home-screen").style.display = "flex";
        }

        function startApp() {
            document.getElementById("home-screen").style.display = "none";
            document.getElementById("app-screen").style.display = "flex";
            loadProfile();
        }

        function loadProfile() {
            const p = profiles[index];
            document.getElementById("p-name").innerText = p.name;
            document.getElementById("p-bio").innerText = p.bio;
            document.getElementById("p-img").src = p.img;
        }

        function swipe(dir) {
            const card = document.getElementById("card");
            lastIndex = index;
            card.classList.add(dir === 'left' ? 'swipe-left' : 'swipe-right');

            setTimeout(() => {
                index = (index + 1) % profiles.length;
                loadProfile();
                card.classList.remove('swipe-left', 'swipe-right');
            }, 400);
        }

        function rewind() {
            if (lastIndex !== null) {
                index = lastIndex;
                lastIndex = null;
                loadProfile();
            }
        }
    </script>
</body>
</html>
