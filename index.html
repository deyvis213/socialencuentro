<!DOCTYPE html>  
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SocialEncuentro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.app {
  width: 320px;
  text-align: center;
}

/* TARJETA */
.card {
  width: 100%;
  height: 450px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
  transition: transform 0.5s ease;
}

.card img {
  width: 100%;
  height: 70%;
  object-fit: cover;
}

.info {
  padding: 10px;
}

.buttons {
  margin-top: 15px;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  border-radius: 50px;
  font-size: 18px;
  cursor: pointer;
}

.like {
  background: #28a745;
  color: white;
}

.nope {
  background: #dc3545;
  color: white;
}

.swipe-left {
  transform: translateX(-400px) rotate(-20deg);
  opacity: 0;
}

.swipe-right {
  transform: translateX(400px) rotate(20deg);
  opacity: 0;
}
</style>
</head>

<body>

<div class="app">
  <div class="card" id="card">
    <img id="photo">
    <div class="info">
      <h2 id="name"></h2>
      <p id="bio"></p>
    </div>
  </div>

  <div class="buttons">
    <button class="nope" onclick="swipe('left')">❌</button>
    <button class="like" onclick="swipe('right')">❤️</button>
  </div>
</div>

<script>
const profiles = [
  {
    name: "Ana, 25",
    bio: "Le gusta viajar ✈️",
    img: "https://i.pravatar.cc/300?img=1"
  },
  {
    name: "Carlos, 28",
    bio: "Empresario 💼",
    img: "https://i.pravatar.cc/300?img=2"
  },
  {
    name: "Laura, 23",
    bio: "Ama los animales 🐶",
    img: "https://i.pravatar.cc/300?img=3"
  },
  {
    name: "Miguel, 30",
    bio: "Fitness 🏋️",
    img: "https://i.pravatar.cc/300?img=4"
  }
];

let index = 0;

function loadProfile() {
  document.getElementById("name").innerText = profiles[index].name;
  document.getElementById("bio").innerText = profiles[index].bio;
  document.getElementById("photo").src = profiles[index].img;
}

function swipe(direction) {
  const card = document.getElementById("card");

  card.classList.add(direction === "left" ? "swipe-left" : "swipe-right");

  setTimeout(() => {
    index = (index + 1) % profiles.length;
    loadProfile();
    card.classList.remove("swipe-left", "swipe-right");
  }, 500);
}

/* SWIPE CON MOUSE / DEDO */
let startX = 0;

document.getElementById("card").addEventListener("mousedown", e => {
  startX = e.clientX;
});

document.getElementById("card").addEventListener("mouseup", e => {
  let endX = e.clientX;
  if (endX - startX > 50) swipe("right");
  else if (startX - endX > 50) swipe("left");
});

document.getElementById("card").addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.getElementById("card").addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  if (endX - startX > 50) swipe("right");
  else if (startX - endX > 50) swipe("left");
});

loadProfile();
</script>

</body>
</html>
